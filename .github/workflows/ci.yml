name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The contract is vendored (src/contracts), so CI needs no backend.
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run build:ssr
      # The demo-agnostic shell smoke needs no backend: '/' streams with the
      # prefetch failure swallowed, so SSR + hydration wiring is still exercised.
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test e2e/smoke.spec.ts

  # The post-init shell must stay green: run init-project on the workspace
  # (throwaway in CI) and put the slimmed tree through the same gate.
  init-project-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/init-project.mjs ci-shell
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run build:ssr
      # Only the shell smoke survives init (auctions.spec.ts is deleted); it
      # runs backend-free, so the post-init e2e promise is gated here.
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec playwright test
