<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Static favicon for dev; in production vite-plugin-pwa (pwaAssets) also injects
         the PWA icons, apple-touch-icon and theme-color. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>madrileno</title>
    <!-- Set the theme class before first paint so dark mode doesn't flash. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (t === 'dark' || ((t === 'system' || !t) && sys)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"><!--app-html--></div>
    <script type="module" src="/src/app/entry-client.tsx"></script>
  </body>
</html>
